# 足球赛事预测管道 - 完整版（修复DeepSeek密钥传递问题）
name: Football Prediction Pipeline

# 触发规则：可手动触发、每天0点自动更新、推送到main分支自动运行
on:
  # 手动触发（在GitHub Actions页面可以手动点运行）
  workflow_dispatch:
  # 定时触发：每天UTC时间0点（北京时间8点）自动更新预测，可自行修改时间
  schedule:
    - cron: '0 0 * * *'
  # 代码提交到main分支时自动运行
  push:
    branches: [ main ]

# 运行权限配置（确保GitHub Pages部署有权限）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 配置Python环境（固定3.11稳定版，兼容你所有依赖）
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 缓存依赖，加快运行速度

      # 3. 安装所有依赖（包括openai库）
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 【核心修复】运行预测管道，把所有Secrets传入环境变量
      - name: 运行预测主管道
        env:
          # 足球数据API密钥（你已配置的）
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # 【关键修复】DeepSeek密钥，之前漏了这一行，现在加上
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 可选：自定义DeepSeek地址，不需要就注释掉
          # DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          # OpenAI相关密钥（你已配置的，备用）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python -m src.build_pipeline

      # 5. 配置GitHub Pages部署
      - name: 配置GitHub Pages
        uses: actions/configure-pages@v5

      # 6. 上传预测结果到Pages
      - name: 上传预测结果
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # 你的预测结果和页面输出目录

      # 7. 自动部署到GitHub Pages
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
