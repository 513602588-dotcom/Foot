name: Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Export JCZQ (500)
        continue-on-error: true
        run: |
          echo "Starting JCZQ export..."
          python -m src.collect.jczq_500 || echo "Warning: JCZQ export failed, continuing..."
          ls -la site/data/ || true

      - name: Run Prediction
        run: |
          echo "Starting prediction engine..."
          echo "Current directory: ${{ github.workspace }}"
          ls -la src/
          python src/predict.py
          ls -la site/data/ || true

      - name: Build site
        continue-on-error: true
        run: python -m src.build || echo "Warning: Site build completed with warnings"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
