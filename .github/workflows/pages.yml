# 足球赛事预测管道 - 省API优化版（彻底关闭改代码自动运行）
name: Football Prediction Pipeline

# 触发规则：仅保留【手动触发】+【定时自动触发】，彻底关闭改代码自动运行
on:
  # 手动触发（在GitHub Actions页面手动点运行，支持自定义参数）
  workflow_dispatch:
    inputs:
      skip_api_request:
        description: "是否仅测试代码，不调用API（省配额）"
        type: boolean
        default: false
        required: false
  # 定时触发：每天UTC时间0点（北京时间8点）自动更新，可自行修改频率
  schedule:
    - cron: '0 0 * * *'

# 运行权限配置（确保GitHub Pages部署有权限，无需修改）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 配置Python环境（固定3.11稳定版，兼容所有依赖）
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 永久缓存pip依赖，不用每次重新安装，加快运行速度

      # 3. 安装所有依赖（仅在依赖变化时重新安装）
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 【核心省API】恢复API缓存文件，重复运行不用重新请求接口
      - name: 恢复API缓存
        uses: actions/cache@v4
        with:
          path: ./data/api_cache.json
          key: api-cache-${{ github.run_id }}
          restore-keys: |
            api-cache-

      # 5. 运行预测主管道（仅在不跳过API时执行）
      - name: 运行预测主管道
        if: ${{ inputs.skip_api_request != true }}
        env:
          # 足球数据API密钥
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # DeepSeek密钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # OpenAI备用密钥
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python -m src.build_pipeline

      # 6. 仅测试代码（跳过API调用，不消耗配额）
      - name: 仅测试代码语法（不调用API）
        if: ${{ inputs.skip_api_request == true }}
        run: |
          echo "✅ 代码语法测试通过，未调用任何API，无配额消耗"
          python -m py_compile src/build_pipeline.py
          python -m py_compile src/engine/fusion_engine.py

      # 7. 配置GitHub Pages部署
      - name: 配置GitHub Pages
        if: ${{ inputs.skip_api_request != true }}
        uses: actions/configure-pages@v5

      # 8. 上传预测结果到Pages
      - name: 上传预测结果
        if: ${{ inputs.skip_api_request != true }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # 预测结果和页面输出目录

      # 9. 自动部署到GitHub Pages
      - name: 部署到GitHub Pages
        if: ${{ inputs.skip_api_request != true }}
        id: deployment
        uses: actions/deploy-pages@v4
