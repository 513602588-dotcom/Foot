# 足球赛事预测管道 - 火山方舟全量适配版（省API优化）
name: Football Prediction Pipeline

# 触发规则：仅手动触发+每天定时触发，彻底关闭改代码自动运行，避免浪费API
on:
  # 手动触发（支持测试模式，不调用API）
  workflow_dispatch:
    inputs:
      skip_api_request:
        description: "是否仅测试代码，不调用API（省配额）"
        type: boolean
        default: false
        required: false
  # 定时触发：每天UTC时间0点（北京时间8点）自动更新，可自行修改时间
  schedule:
    - cron: '0 0 * * *'

# GitHub Pages部署权限配置
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 配置Python环境
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装所有依赖
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 恢复API缓存，减少重复请求，省API配额
      - name: 恢复API缓存
        uses: actions/cache@v4
        with:
          path: ./data/api_cache.json
          key: api-cache-${{ github.run_id }}
          restore-keys: |
            api-cache-

      # 5. 运行预测主管道（传入所有密钥，包括火山方舟）
      - name: 运行预测主管道
        if: ${{ inputs.skip_api_request != true }}
        env:
          # 足球数据API密钥（原有不变）
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # 火山方舟API密钥（核心新增）
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: python -m src.build_pipeline

      # 6. 仅测试代码语法（不调用API，不消耗配额）
      - name: 仅测试代码语法（不调用API）
        if: ${{ inputs.skip_api_request == true }}
        run: |
          echo "✅ 代码语法测试通过，未调用任何API，无配额消耗"
          python -m py_compile src/build_pipeline.py
          python -m py_compile src/engine/fusion_engine.py

      # 7. 配置GitHub Pages
      - name: 配置GitHub Pages
        if: ${{ inputs.skip_api_request != true }}
        uses: actions/configure-pages@v5

      # 8. 上传预测结果到Pages
      - name: 上传预测结果
        if: ${{ inputs.skip_api_request != true }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # 9. 部署到GitHub Pages
      - name: 部署到GitHub Pages
        if: ${{ inputs.skip_api_request != true }}
        id: deployment
        uses: actions/deploy-pages@v4
