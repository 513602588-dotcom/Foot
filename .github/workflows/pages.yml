name: Daily JCZQ Build & Deploy
on:
  schedule:
    - cron: '30 1 * * *'  # 北京时间 09:30 每日自动运行
    - cron: '30 13 * * *' # 北京时间 21:30 每日自动运行
  workflow_dispatch: # 保留手动触发按钮

# 修复Node.js版本警告，适配GitHub最新规则
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libasound2-dev

      - name: 安装项目依赖
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: 校验必填赛事API密钥（仅校验核心必须项，大模型不强制）
        run: |
          if [ -z "${{ secrets.API_FOOTBALL_KEY }}" ]; then
            echo "错误：缺少必填的API_FOOTBALL_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.FOOTBALL_DATA_KEY }}" ]; then
            echo "错误：缺少必填的FOOTBALL_DATA_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.ODDS_API_KEY }}" ]; then
            echo "错误：缺少必填的ODDS_API_KEY"
            exit 1
          fi
        shell: bash

      - name: 运行完整预测管道（适配DeepSeek大模型+密钥验证）
        run: |
          # 密钥有效性验证：输出密钥长度，不会泄露密钥明文，确认是否成功传递
          echo "=== 密钥传递验证结果 ==="
          echo "API_FOOTBALL_KEY 长度：${#API_FOOTBALL_KEY}"
          echo "FOOTBALL_DATA_KEY 长度：${#FOOTBALL_DATA_KEY}"
          echo "ODDS_API_KEY 长度：${#ODDS_API_KEY}"
          echo "=========================="
          # 执行核心预测脚本
          python -m src.build_pipeline
        env:
          # 核心赛事数据API（必填，名称必须和存储库密钥完全一致）
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # DeepSeek大模型配置（可选，填了就自动启用）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # 运行日志级别
          LOG_LEVEL: INFO

      - name: 部署预测页面到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
